<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospection · Greatly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="top">
    <div class="brand"><div class="logo">G</div><b>Greatly</b><span>· Prospection</span></div>
    <button class="btn-add" id="addBtn">+ Ajouter un prospect</button>
    <div class="demo-badge" id="modeBadge">Mode démo</div>
  </header>

  <main>
    <section id="boardView">
      <div class="stats" id="stats"></div>
      <div class="board" id="board"></div>
    </section>

    <section id="detailView" class="hidden"></section>
    <section id="formView" class="hidden"></section>
  </main>

  <div class="toast" id="toast"></div>

  <!-- Scripts classiques chargés dans l'ordre (pas de build) -->
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/board.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/form.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
